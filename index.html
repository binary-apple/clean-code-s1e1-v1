<!DOCTYPE html>
<html>
<head><title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>
<body>
  <header class="header">
    <img src="./eisenhower-matrix.jpg" alt="The Eisenhower matrix shows how to make decisions on what is urgent and important" class="header__img"><a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </header>
  <main class="main">
    <section class="add-new-task">
      <p id="top-section-for-adding-element-to-list" class="add-task"><label for="new-task">Add Item</label>
        <div class="task-row-wrapper"><input id="new-task"class="task-item__task" type="text"><button>Add</button></div>
      </p>
    </section>
    <section class="task-list">
      <h3 class="task-list__title">Todo</h3>
      <ul id="incomplete-tasks">
        <li><input type="checkbox"><label class="task-item__task">Pay Bills</label><input type="text" class="task-item__task"><button class="edit">Edit</button><button class="task-item__remove-button"><img src="./remove.svg" alt="remove button" class="task-item__remove-img"></button></li>
        <li class="edit-mode"><input type="checkbox"><label class="task-item__task">Go Shopping</label><input type="text" value="Go Shopping" class="task-item__task"><button class="edit">Save</button><button class="task-item__remove-button"><img src="./remove.svg" alt="remove button" class="task-item__remove-img"></button></li>
      </ul>
    </section>
    <section class="task-list">
      <h3 class="task-list__title">Completed</h3>
      <ul id="completed-tasks">
        <li><input type="checkbox" checked><label class="task-item__task">See the Doctor</label><input type="text" class="task-item__task"><button class="edit">Edit</button><button class="task-item__remove-button"><img src="./remove.svg" alt="remove button" class="task-item__remove-img"></button></li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
